keyboard_mappings:
  main:
    create_simple_clicker: "1"
    quit : "q"
  create_tool:
    add_template_detector: "1"
    add_text_detector: "2"
    add_yolo_detector: "3"
    save: "s"
    cancel: "c"
  capture_area:
    full_screen: "f"
    select_area: "s"
    cancel: "c"


ui_settings:
  theme: "dark"
  language: "en"

tool_options:
  auto_save: true
  max_retries: 5

yolo:
  model_id: "your-model-id"
  api_key: "your-api-key"
  confidence_threshold: 0.6
  max_predictions: 3

template:
  template_paths: []
  threshold: 0.95

text:
  language: "en"
  gpu: false
  confidence_threshold: 0.7
  upscale_factor: 5
  nl_means: true
  nl_h: 15
