<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>JSON Editor</title>
  <link href="https://cdn.jsdelivr.net/npm/jsoneditor@9.10.0/dist/jsoneditor.min.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/jsoneditor@9.10.0/dist/jsoneditor.min.js"></script>
  <style>
    html, body, #jsoneditor { height: 100%; margin: 0; }
  </style>
</head>
<body>
  <button id="saveBtn" onclick="saveJson()">Save</button>
  <div id="jsoneditor"></div>
  <script>
    const container = document.getElementById('jsoneditor');
    const options = {
      mode: 'tree'
    };
    const editor = new JSONEditor(container, options);

    window.setData = function(data) {
      editor.set(JSON.parse(data));
    }
    window.getData = function() {
      return JSON.stringify(editor.get());
    }
    function saveJson() {
      const json = editor.get();
      if (window.pywebview && window.pywebview.api && window.pywebview.api.on_change) {
        window.pywebview.api.on_change(JSON.stringify(json));
      }
      if (window.pywebview && window.pywebview.closeWindow) {
        window.pywebview.closeWindow();
      } else {
        window.close();
      }
    }
  </script>
</body>
</html>
