tool_options:
  auto_save: true
  max_retries: 5

yolo:
  model_id: ${YOLO_MODEL_ID}
  api_key: ${YOLO_API_KEY}
  confidence_threshold: 0.6
  max_predictions: 3

template:
  template_paths: []
  threshold: 0.95

text:
  language: "en"
  gpu: false
  confidence_threshold: 0.7
  upscale_factor: 5
  nl_means: true
  nl_h: 15
